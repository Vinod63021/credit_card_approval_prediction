<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --background: #F3F4F6;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #D1D5DB;
            --success: #10B981;
            --success-bg: #D1FAE5;
            --error: #EF4444;
            --error-bg: #FEE2E2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #E0E7FF 0%, #F3F4F6 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            box-sizing: border-box;
            color: var(--text-main);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 900px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            font-weight: 700;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: -0.025em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input,
        select {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background-color: #F9FAFB;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: #fff;
        }

        .btn-predict {
            grid-column: 1 / -1;
            padding: 16px;
            background: linear-gradient(to right, var(--primary), #6366F1);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
        }

        .btn-predict:hover {
            background: linear-gradient(to right, var(--primary-hover), var(--primary));
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(79, 70, 229, 0.4);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .result-box {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .status-approved {
            background-color: var(--success-bg);
            color: var(--success);
            border: 1px solid #A7F3D0;
        }

        .status-denied {
            background-color: var(--error-bg);
            color: var(--error);
            border: 1px solid #FECACA;
        }

        .status-error {
            background-color: #FEF3C7;
            color: #D97706;
            border: 1px solid #FDE68A;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Credit Card Approval Prediction</h2>
        <form action="/predict" method="POST" class="form-grid">
            <div class="form-group"><label>Gender</label><select name="gender">
                    <option value="F">Female</option>
                    <option value="M">Male</option>
                </select></div>
            <div class="form-group"><label>Own Car?</label><select name="car">
                    <option value="Y">Yes</option>
                    <option value="N">No</option>
                </select></div>
            <div class="form-group"><label>Own Real Estate?</label><select name="realty">
                    <option value="Y">Yes</option>
                    <option value="N">No</option>
                </select></div>

            <div class="form-group"><label>Total Annual Income ($)</label><input type="number" name="income"
                    placeholder="50000" required></div>
            <div class="form-group"><label>Income Type</label><select name="income_type">
                    <option>Working</option>
                    <option>Commercial associate</option>
                    <option>Pensioner</option>
                    <option>State servant</option>
                </select></div>
            <div class="form-group"><label>Education</label><select name="education">
                    <option>Higher education</option>
                    <option>Secondary / secondary special</option>
                    <option>Incomplete higher</option>
                </select></div>

            <div class="form-group"><label>Family Status</label><select name="family_status">
                    <option>Married</option>
                    <option>Single / not married</option>
                    <option>Civil marriage</option>
                </select></div>
            <div class="form-group"><label>Housing Type</label><select name="housing">
                    <option>House / apartment</option>
                    <option>With parents</option>
                    <option>Municipal apartment</option>
                </select></div>
            <div class="form-group"><label>Family Members</label><input type="number" name="family_members"
                    placeholder="2" required min="1"></div>

            <div class="form-group"><label>Age (Years)</label><input type="number" name="age" placeholder="30" required
                    min="18"></div>
            <div class="form-group"><label>Years Employed</label><input type="number" name="years_employed"
                    placeholder="5" required min="0" step="0.1"></div>
            <div></div>

            <button type="submit" class="btn-predict">Predict Approval</button>
        </form>

        {% if prediction_text %}
        <div
            class="result-box {% if status == 'approved' %}status-approved{% elif status == 'denied' %}status-denied{% else %}status-error{% endif %}">
            {{ prediction_text }}
        </div>

        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
        {% if status == 'approved' %}
        <script>
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        </script>
        {% endif %}
        {% endif %}
    </div>

</body>

</html>
